<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Flip Card </title>
    <link rel="stylesheet" href="flip.css">
</head>
<body>

    <div class="card-container" id="cardContainer">

            <div class="card" id=card>
            <!-- front side of the card -->
                    <div class="card-face card-front">
                        <div class="icon">👽</div>
                        <p> Welcome to the world of CSS transitions. Click this card to discover what's on the other side</p>
                        <div class="hint"> Click to Flip </div>
                    </div>
            <!-- Back Side of the Card-->
             <div class="card-face card-back"      >
                <div class="icon">✅</div>
                <h2> You Found It!</h2>
                <p> Great Job! This is the back of the card. CSS 3d transforms make this smooth flip effect possible</p>
             </div>  
            </div>
    </div>

    <script>
        let flipped = false;

        document.getElementById('cardContainer').onclick = function(){
            let card = document.getElementById('card');
            if(flipped){
                card.style.transform = 'rotateY(0deg)';
            }else{
                card.style.transform = 'rotateY(180deg)';
            }

            flipped = !flipped;
        };
    </script>
</body>
</html>
